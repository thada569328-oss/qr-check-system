<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h1,h2{
  margin-top:0;
}

select,input,button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #d1d5db;
  margin-top:10px;
  font-size:16px;
}

button{
  border:none;
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

#reader{
  width:100%;
  overflow:hidden;
  border-radius:20px;
  background:black;
}

.hidden{
  display:none;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 20px;
  border-radius:14px;
  color:white;
  font-weight:bold;
  z-index:9999;
  display:none;
}

.success{
  background:#10b981;
}

.error{
  background:#ef4444;
}

.history-item{
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:12px;
  margin-top:12px;
}
</style>
</head>
<body>

<div class="container">

<div id="homePage">
  <div class="card">
    <h1>ระบบเช็คงาน QR</h1>

    <label>วิชา</label>
    <select id="subject"></select>

    <label>งาน</label>
    <select id="assignment"></select>

    <label>คะแนน</label>
    <input type="number" id="score" placeholder="คะแนน">

    <button onclick="startScan()">เริ่มสแกน</button>
  </div>

  <div class="card">
    <h2>ประวัติ</h2>
    <div id="history"></div>
  </div>
</div>

<div id="scannerPage" class="hidden">
  <div class="card">
    <button onclick="backHome()">ย้อนกลับ</button>

    <h2>บันทึกแล้ว <span id="count">0</span> คน</h2>

    <div id="reader"></div>
  </div>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
const WEB_APP_URL = 'ใส่ Web App URL';

let qr = null;
let total = 0;
let current = null;

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.className='toast '+type;
  t.innerText=msg;
  t.style.display='block';

  setTimeout(()=>{
    t.style.display='none';
  },2000);
}

async function api(params){
  const url=WEB_APP_URL+'?'+new URLSearchParams(params);
  const res=await fetch(url);
  return await res.json();
}

async function loadSubjects(){
  const data=await api({action:'getSubjects'});

  const s=document.getElementById('subject');

  s.innerHTML='<option value="">เลือกวิชา</option>';

  data.forEach(item=>{
    s.innerHTML+=`<option value="${item}">${item}</option>`;
  });
}

async function loadAssignments(){
  const subject=document.getElementById('subject').value;

  const data=await api({
    action:'getAssignments',
    subject:subject
  });

  const a=document.getElementById('assignment');

  a.innerHTML='';

  data.forEach(item=>{
    a.innerHTML+=`<option value='${JSON.stringify(item)}'>${item.name}</option>`;
  });
}

async function startScan(){
  const subject=document.getElementById('subject').value;
  const assignment=document.getElementById('assignment').value;
  const score=document.getElementById('score').value;

  if(!subject||!assignment||score===''){
    toast('กรอกข้อมูลให้ครบ','error');
    return;
  }

  current={
    subject,
    assignment:JSON.parse(assignment),
    score
  };

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('scannerPage').classList.remove('hidden');

  qr=new Html5Qrcode('reader');

  try{
    await qr.start(
      {facingMode:'environment'},
      {fps:10,qrbox:250},
      onScan
    );
  }catch(err){
    toast('เปิดกล้องไม่ได้','error');
  }
}

async function onScan(text){
  try{
    const result=await api({
      action:'submitScore',
      subject:current.subject,
      col:current.assignment.col,
      studentId:text,
      score:current.score,
      overwrite:false
    });

    if(result.status==='success'){
      total++;
      document.getElementById('count').innerText=total;
      toast('บันทึกสำเร็จ','success');

      if(navigator.vibrate){
        navigator.vibrate(200);
      }

    }else if(result.status==='duplicate'){
      toast('มีคะแนนแล้ว','error');

    }else{
      toast(result.message,'error');
    }

  }catch(err){
    toast('เชื่อมต่อไม่ได้','error');
  }
}

async function backHome(){
  if(qr){
    try{
      await qr.stop();
      await qr.clear();
    }catch(e){}
  }

  document.getElementById('scannerPage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
}

async function loadHistory(){
  try{
    const data=await api({action:'getHistory'});

    const h=document.getElementById('history');

    if(!data.length){
      h.innerHTML='ยังไม่มีประวัติ';
      return;
    }

    h.innerHTML='';

    data.forEach(item=>{
      h.innerHTML+=`
      <div class="history-item">
        <b>${item.subject}</b><br>
        งาน: ${item.assignment}<br>
        คะแนน: ${item.score}<br>
        จำนวน: ${item.count}
      </div>
      `;
    });

  }catch(err){
    document.getElementById('history').innerHTML='โหลดประวัติไม่ได้';
  }
}

document
.getElementById('subject')
.addEventListener('change',loadAssignments);

loadSubjects();
loadHistory();
</script>

</body>
</html>
